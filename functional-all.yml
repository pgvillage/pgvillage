---

- name: Process all linux requirements
  hosts:
    - hacluster
    - backup
    - router
    - localhost
  become: true
  gather_facts: true
  tasks:

    - name: Roles as defined in the invenntory
      include_role:
        name: "pgvillage.{{ item.name }}"
        apply:
          tags: "{{ item.tags | default([]) | combine([item.name]) }}"
      loop: "{{ pgvillage_roles | default(_pgvillage_roles) }}"
      tags: always
      when: 
        - inventory_hostname in {{ item.groups | map('extract', groups) | flatten | unique }}"

  vars:
    _pgvillage_roles:
      - role: linux
        groups: [ hacluster, backup, router, localhost ]
        tags: [ packages ]
      - role: chainsmith
        groups: [ hacluster, backup, router, localhost ]
        tags: [ certificates, certs ]
      - role: firewall
        groups: [ hacluster, backup, router ]
        tags: [ firewalld ]
      - role: etcd
        groups: [ etcd_master ]
        tags: [ firewalld ]
      - role: minio
        groups: [ backup ]
      - role: walg
        groups: [ backup ]
      - role: stolon
        groups: [ hacluster ]
        tags: [ postgres, postgresql, pg ]
      - role: avchecker
        groups: [ hacluster ]
      #- role: haproxy
      #  groups: [ router ]
      #  tags: [ haproxy, router, keepalived, pgroute66 ]
      #- role: keepalived
      #  groups: [ router ]
      #  tags: [ haproxy, router, keepalived, pgroute66 ]
      #- role: pgroute66
      #  groups: [ router ]
      #  tags: [ haproxy, router, keepalived, pgroute66 ]
      - role: pgbouncer
        groups: [ hacluster ]
        tags: [ bouncer, pooler ]
      - role: nagios
        groups: [ hacluster, backup, router ]
        tags: [ bouncer, pooler ]
      - role: pgquartz
        groups: [ hacluster ]
